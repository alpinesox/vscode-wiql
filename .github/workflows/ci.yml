name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.95.6
        with:
          path: ./
          extra_args: --results=verified,unknown --fail
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install semgrep==1.99.0
      - run: semgrep scan --config p/ci --error

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run check:main
      - run: npm test
      - run: npm run list:vsix
      - run: npm run package:vsix
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: vscode-wiql-vsix-${{ github.sha }}
          path: dist/*.vsix
          if-no-files-found: error
          retention-days: 30
