name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - run: docker run --rm -v "${{ github.workspace }}:/repo" ghcr.io/trufflesecurity/trufflehog@sha256:96f8429082cb2d4ae73b1096dcdb2f5aa139881d97042b0c5e5fa226a392e056 filesystem /repo --exclude-paths /repo/.trufflehog-exclude --fail --fail-on-scan-errors --no-update --results=verified,unknown
      - run: docker run --rm -v "${{ github.workspace }}:/repo" ghcr.io/trufflesecurity/trufflehog@sha256:96f8429082cb2d4ae73b1096dcdb2f5aa139881d97042b0c5e5fa226a392e056 git file:///repo --fail --fail-on-scan-errors --no-update --results=verified,unknown
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install setuptools semgrep==1.99.0
      - run: semgrep scan --config p/ci --error

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run check:main
      - run: npm test
      - run: npm run list:vsix
      - run: npm run package:vsix
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: github.event_name == 'push'
        with:
          name: vscode-wiql-vsix-${{ github.sha }}
          path: dist/*.vsix
          if-no-files-found: error
          retention-days: 30
