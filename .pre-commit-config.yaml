repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        language: system
        entry: trufflehog filesystem --fail --no-update --results=verified,unknown
      - id: semgrep
        name: Semgrep
        language: system
        entry: semgrep
        pass_filenames: false
        args: ["--config", "p/ci", "--error"]
